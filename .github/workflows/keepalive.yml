name: keepalive

# GitHub auto-disables scheduled workflows after 60 days with no repository
# activity. A weekly empty commit keeps the osv-catalog cron alive even during
# long quiet periods upstream.

on:
  schedule:
    - cron: '17 3 * * 1'   # 03:17 UTC every Monday
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: keepalive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keepalive (keep scheduled workflows enabled)"
          git push
